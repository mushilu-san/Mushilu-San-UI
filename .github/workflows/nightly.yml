name: Nightly full suite

# Safety net for the affected-testing heuristic used on PRs (see .github/workflows/ci.yml
# and scripts/affected.mjs): always runs the complete unit + E2E suite against main, so a
# convention-mapping miss on a PR doesn't silently escape coverage for long.
on:
  schedule:
    - cron: '17 3 * * *' # 03:17 UTC daily
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: nightly-full-suite
  cancel-in-progress: false

jobs:
  full-suite:
    name: Full suite (unit + E2E)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Cache Angular build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .angular/cache
          key: angular-cache-${{ runner.os }}-nightly-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            angular-cache-${{ runner.os }}-nightly-${{ hashFiles('package-lock.json') }}-
            angular-cache-${{ runner.os }}-nightly-

      - name: Cache Nx cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .nx/cache
          key: nx-cache-${{ runner.os }}-nightly-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nx-cache-${{ runner.os }}-nightly-${{ hashFiles('package-lock.json') }}-
            nx-cache-${{ runner.os }}-nightly-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test (full suite)
        run: npm run test:ci

      - name: Build library
        run: npm run build

      - name: Bundle size budget
        run: npm run size

      - name: Build Storybook
        run: npm run storybook:build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E tests (full suite)
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
