name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci-matrix:
    name: ci (node ${{ matrix.node || '.nvmrc' }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # '' = canonical version from .nvmrc (single source of truth, shared with
        # local dev and the other workflows). '24' = forward-compat probe that
        # validates the `engines` range (^22.12.0 || >=24.0.0). Build/size/coverage/
        # Storybook artifacts are produced on the canonical leg only.
        node: ['', '24']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # When matrix.node is '', node-version is empty (ignored) and the version is
      # read from .nvmrc. When it is '24', node-version-file is empty (ignored).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ matrix.node == '' && '.nvmrc' || '' }}
          node-version: ${{ matrix.node }}
          cache: 'npm'

      # Angular's incremental build cache speeds up ng build / Storybook across runs.
      - name: Cache Angular build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .angular/cache
          key: angular-cache-${{ runner.os }}-node${{ matrix.node || 'nvmrc' }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            angular-cache-${{ runner.os }}-node${{ matrix.node || 'nvmrc' }}-${{ hashFiles('package-lock.json') }}-
            angular-cache-${{ runner.os }}-node${{ matrix.node || 'nvmrc' }}-

      # npm ci fails hard if package-lock.json is out of sync with package.json
      # (including workspaces). That is intentional: fix the lockfile locally with
      # `npm install` and commit it — never replace this with `npm install` in CI.
      - name: Install dependencies
        run: npm ci

      # 1. Linting & code quality — fail fast, nothing else runs if this fails
      - name: Lint
        run: npm run lint

      # 2. Formatting — catch style drift that ESLint does not cover
      - name: Format check
        run: npm run format:check

      # 3. Tests — full suite, no watch
      - name: Test
        run: npm run test:ci

      # Retain V8 coverage for inspection on the run summary (canonical leg only).
      - name: Upload coverage
        if: matrix.node == '' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 14
          if-no-files-found: warn

      # 4. Production build (canonical leg only — it feeds the size gate + artifact)
      - name: Build library
        if: matrix.node == ''
        run: npm run build

      # 5. Bundle size budget — enforces the per-entry-point gzip limits in package.json
      - name: Bundle size budget
        if: matrix.node == ''
        run: npm run size

      # 6. Archive build output — downloadable zip on the run summary page
      - name: Upload build artifact
        if: matrix.node == ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mushilu-san-ui-${{ github.sha }}
          path: dist/ui
          if-no-files-found: error
          retention-days: 14

      # 7. Smoke test: catches broken stories before the deploy workflow runs on main
      - name: Build Storybook
        if: matrix.node == ''
        run: npm run storybook:build

  # Single status gate required by branch protection — succeeds only when every
  # matrix leg passes. GitHub cannot aggregate matrix jobs into one status on its
  # own, so this job bridges the gap.
  ci:
    name: ci
    needs: ci-matrix
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All matrix legs passed
        env:
          MATRIX_RESULT: ${{ needs.ci-matrix.result }}
        run: |
          if [[ "$MATRIX_RESULT" != "success" ]]; then
            echo "One or more matrix legs failed: $MATRIX_RESULT"
            exit 1
          fi

  # Blocks PRs that introduce dependencies with known CVEs or disallowed licenses.
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
