name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Node version comes from .nvmrc — single source of truth shared with
      # local dev (nvm use) and the other workflows. Never hardcode it here.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # npm ci fails hard if package-lock.json is out of sync with
      # package.json (including workspaces). That is intentional: fix the
      # lockfile locally with `npm install` and commit it — never replace
      # this with `npm install` in CI.
      - name: Install dependencies
        run: npm ci

      # 1. Linting & code quality — fail fast, nothing else runs if this fails
      - name: Lint
        run: npm run lint

      # 2. Tests — full suite, no watch
      - name: Test
        run: npm run test:ci

      # 3. Production build
      - name: Build library
        run: npm run build

      # 4. Archive build output — downloadable zip on the run summary page
      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mushilu-san-ui-${{ github.sha }}
          path: dist/ui
          if-no-files-found: error
          retention-days: 14

      # Smoke test: catches broken stories before the deploy workflow runs on main
      - name: Build Storybook
        run: npm run storybook:build
