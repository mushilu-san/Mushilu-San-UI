<ng-content select="[muiButtonIconStart]" />

@if (loading()) {
  <span class="mui-button__spinner" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" stroke-opacity="0.2" />
      <circle
        cx="12"
        cy="12"
        r="10"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-dasharray="32"
        stroke-dashoffset="8"
      />
    </svg>
  </span>
}

<span class="mui-button__label">
  <ng-content />
</span>

<ng-content select="[muiButtonIconEnd]" />
