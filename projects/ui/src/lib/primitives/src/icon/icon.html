<svg
  [attr.width]="svgSize()"
  [attr.height]="svgSize()"
  viewBox="0 0 24 24"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  aria-hidden="true"
>
  @for (path of iconData().paths; track $index) {
    <path
      [attr.d]="path"
      stroke="currentColor"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  }
</svg>
