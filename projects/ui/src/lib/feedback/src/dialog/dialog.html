<!--
  The (click) handler detects backdrop clicks on the native <dialog> element.
  Keyboard dismissal is handled natively via Escape -> (cancel)/(close), and the
  backdrop must not be focusable, so the click-events-have-key-events and
  interactive-supports-focus rules are intentionally disabled for this element.
-->
<!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events, @angular-eslint/template/interactive-supports-focus -->
<dialog
  #dialog
  class="mui-dialog__panel"
  part="panel"
  [attr.data-size]="size()"
  [attr.aria-labelledby]="heading() ? headingId : null"
  (close)="onNativeClose()"
  (cancel)="onCancel($event)"
  (click)="onBackdropClick($event)"
>
  <div class="mui-dialog__surface">
    <div class="mui-dialog__header">
      @if (heading()) {
        <h2 class="mui-dialog__title" [id]="headingId" part="title">{{ heading() }}</h2>
      }
      <button
        type="button"
        class="mui-dialog__close"
        part="close"
        aria-label="Close dialog"
        (click)="close()"
      >
        <svg viewBox="0 0 20 20" width="18" height="18" fill="none" aria-hidden="true">
          <path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
      </button>
    </div>

    <div class="mui-dialog__body" part="body">
      <ng-content />
    </div>

    <div class="mui-dialog__footer" part="footer">
      <ng-content select="[slot=footer]" />
    </div>
  </div>
</dialog>
