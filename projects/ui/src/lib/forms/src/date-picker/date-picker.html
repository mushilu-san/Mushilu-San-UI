<!-- Trigger -->
<button
  class="dp-trigger"
  type="button"
  part="trigger"
  [attr.aria-expanded]="isOpen() ? 'true' : 'false'"
  aria-haspopup="dialog"
  [attr.aria-controls]="panelId"
  [attr.aria-disabled]="isDisabled() || null"
  [attr.tabindex]="isDisabled() ? -1 : 0"
  (click)="toggle()"
>
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
    <rect x="2" y="3" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5" />
    <path d="M5 2V4M11 2V4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
    <path d="M2 7H14" stroke="currentColor" stroke-width="1.5" />
  </svg>
  <span class="dp-display">{{ displayValue() }}</span>
</button>

<!-- Floating calendar panel -->
@if (isOpen()) {
  <div
    class="dp-panel"
    part="panel"
    role="dialog"
    [id]="panelId"
    aria-label="Date picker"
    aria-modal="true"
  >
    <mui-calendar
      [value]="value()"
      (valueChange)="onCalendarSelect($event)"
      [minDate]="minDate()"
      [maxDate]="maxDate()"
      [locale]="locale()"
    />
  </div>
}
