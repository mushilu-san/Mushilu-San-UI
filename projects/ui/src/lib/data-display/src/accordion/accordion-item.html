<button
  #trigger
  type="button"
  class="mui-accordion-item__trigger"
  part="trigger"
  [id]="triggerId"
  [attr.aria-expanded]="isOpen()"
  [attr.aria-controls]="panelId"
  [attr.aria-disabled]="disabled() || null"
  (click)="toggle()"
>
  <span class="mui-accordion-item__heading" part="heading">{{ heading() }}</span>
  <svg
    class="mui-accordion-item__chevron"
    part="chevron"
    viewBox="0 0 20 20"
    width="20"
    height="20"
    fill="none"
    aria-hidden="true"
  >
    <path
      d="M5 7.5l5 5 5-5"
      stroke="currentColor"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </svg>
</button>

<div
  class="mui-accordion-item__panel"
  part="panel"
  role="region"
  [id]="panelId"
  [attr.aria-labelledby]="triggerId"
  [attr.hidden]="!isOpen() || null"
>
  <div class="mui-accordion-item__body" part="body">
    <ng-content />
  </div>
</div>
