<ng-content select="[muiContextMenuTrigger]" />

@if (open()) {
  <div
    class="mui-context-menu__panel"
    part="panel"
    role="menu"
    aria-orientation="vertical"
    tabindex="-1"
    (click)="$event.stopPropagation()"
    (keydown)="$event.stopPropagation()"
  >
    <ng-content />
  </div>
}
