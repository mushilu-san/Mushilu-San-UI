<ng-content select="[muiPopoverTrigger]" />

@if (open()) {
  <div
    #panelEl
    class="mui-popover__panel"
    part="panel"
    role="dialog"
    tabindex="-1"
    [id]="panelId"
    [attr.data-placement]="placement()"
    [attr.aria-labelledby]="heading() ? headingId : null"
    [attr.aria-modal]="'true'"
  >
    @if (heading()) {
      <p class="mui-popover__heading" part="heading" [id]="headingId">{{ heading() }}</p>
    }
    <ng-content />
  </div>
}
