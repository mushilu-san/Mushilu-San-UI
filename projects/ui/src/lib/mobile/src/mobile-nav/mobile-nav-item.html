<button
  class="mui-mobile-nav-item__btn"
  part="button"
  type="button"
  [attr.aria-current]="isActive() ? 'page' : null"
  [attr.aria-label]="badgeLabel() ? label() + ', ' + badgeLabel() + ' notifications' : null"
>
  <span class="mui-mobile-nav-item__icon" part="icon" aria-hidden="true">
    <ng-content />
    @if (badgeLabel()) {
      <span class="mui-mobile-nav-item__badge" part="badge" aria-hidden="true">{{ badgeLabel() }}</span>
    }
  </span>
  <span class="mui-mobile-nav-item__label" part="label">{{ label() }}</span>
</button>
