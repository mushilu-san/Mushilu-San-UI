<!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events, @angular-eslint/template/interactive-supports-focus -->
<dialog
  #dialog
  class="mui-bottom-sheet__panel"
  part="panel"
  [attr.data-size]="size()"
  [attr.aria-labelledby]="heading() ? headingId : null"
  (close)="onNativeClose()"
  (cancel)="onCancel($event)"
  (click)="onBackdropClick($event)"
>
  <div class="mui-bottom-sheet__surface" part="surface">
    @if (showHandle()) {
      <div class="mui-bottom-sheet__handle" part="handle" aria-hidden="true"></div>
    }

    <div class="mui-bottom-sheet__header" part="header">
      @if (heading()) {
        <h2 class="mui-bottom-sheet__title" [id]="headingId" part="title">{{ heading() }}</h2>
      }
      <button
        type="button"
        class="mui-bottom-sheet__close"
        part="close"
        aria-label="Close"
        (click)="close()"
      >
        <svg viewBox="0 0 20 20" width="18" height="18" fill="none" aria-hidden="true">
          <path
            d="M5 5l10 10M15 5L5 15"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
        </svg>
      </button>
    </div>

    <div class="mui-bottom-sheet__body" part="body">
      <ng-content />
    </div>

    <div class="mui-bottom-sheet__footer" part="footer">
      <ng-content select="[slot=footer]" />
    </div>
  </div>
</dialog>
